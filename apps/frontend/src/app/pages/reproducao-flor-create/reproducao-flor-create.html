<mat-card class="mx-20 mt-10 rounded-lg overflow-hidden">
    <mat-card-header class="bg-green-900">
        <mat-card-title class="!text-3xl px-2 py-3 !font-extrabold text-gray-100">
            {{ isEditMode() ? 'Editar Reprodução' : 'Criar Reprodução' }}
        </mat-card-title>
    </mat-card-header>
    <mat-card-content class="!p-0">
        <div class="flex">
                <div class="w-4/9 shrink-0">
                <img src="/orquidea3.png" alt="Orquídea" class="w-200 h-full object-cover">
            </div>
                <div class="flex-1 p-6 bg-purple-100">
                <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col h-full">
                    <div>
                        <div class="mb-4">
                            <label for="orquidarioId" class="block text-lg font-medium">Orquidário ID</label>
                            <input formControlName="orquidarioId" id="orquidarioId" type="text" [value]="form.get('orquidarioId')" name="orquidarioId" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>

                        <div class="mb-4">
                            <label for="hibridoNome" class="block text-lg font-medium"> Híbrido Nome</label>
                            <input formControlName="hibridoNome" id="hibridoNome" type="text" [value]="form.get('hibridoNome')" name="hibridoNome" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>

                        <div class="mb-4">
                            <label for="dataGerminacao" class="block text-lg font-medium text-muted-foreground">Data de Germinação</label>
                            <input formControlName="dataGerminacao" id="dataCriacao" type="date" [value]="form.get('dataGerminacao')?.value" name="dataGerminacao" required class="mt-1 p-2 h-10 w-full bg-neutral-100 rounded-md !border-gray-600 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                        </div>

                        <div class="mb-4">
                            <label for="taxaSucessoPct" class="block text-lg font-medium">Taxa Sucesso (%)</label>
                            <input formControlName="taxaSucessoPct" id="taxaSucessoPct" type="number" [value]="form.get('taxaSucessoPct')" name="taxaSucessoPct" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>
                        
                        <div class="flex items-center gap-2 mt-8">
                            <label for="viavel" class="text-lg font-medium">Viabilidade</label>
                            <input formControlName="viavel" id="viavel" type="checkbox" [value]="form.get('viavel')" name="viavel" class="size-5 accent-green-800">
                        </div>

                    </div>
                    <div class="flex justify-end gap-4 mt-8">
                        <button type="submit" class="px-4 py-2 bg-green-800 text-white rounded-md hover:bg-green-700">Salvar</button>
                        <button type="button" (click)="onCancel()" class="px-4 py-2 bg-gray-300 rounded-md hover:bg-gray-400">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </mat-card-content>
</mat-card>
