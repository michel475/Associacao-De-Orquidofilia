<mat-card class="mx-20 mt-10 bg-purple-400 rounded-t-lg overflow-hidden">
    <mat-card-header class="bg-green-900">
        <h2 class="text-2xl font-bold text-white p-4">Reproduções</h2>
        <div class="flex-1 flex justify-end">
            <button matButton="filled" title="Adicionar Reprodução" class="!text-white !bg-green-600 !hover:bg-green-700 mt-3" (click)="reproducaoCreateForm()">
                <mat-icon>add</mat-icon>
                Adicionar
            </button>
        </div>
            
    </mat-card-header>
    <mat-card-content class="listagem p-4" appearance="outlined">
        <table mat-table [dataSource]="reproducoesPaginadas()" class="mt-5 rounded-lg overflow-hidden">
            <ng-container matColumnDef="orquidarioId">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> OrquidarioId </th>
                <td mat-cell *matCellDef="let reproducao" class="text-left"> {{reproducao.orquidarioId}} </td>
            </ng-container>
            <ng-container matColumnDef="hibridoNome">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Híbrido Nome </th>
                <td mat-cell *matCellDef="let reproducao" class="text-left"> {{reproducao.hibridoNome}} </td>
            </ng-container>
            <ng-container matColumnDef="dataGerminacao">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Data de Germinação </th>
                <td mat-cell *matCellDef="let reproducao" class="text-left"> {{reproducao.dataGerminacao}} </td>
            </ng-container>
            <ng-container matColumnDef="taxaSucessoPct">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Taxa Sucesso (%) </th>
                <td mat-cell *matCellDef="let reproducao" class="text-left"> {{reproducao.taxaSucessoPct}} </td>
            </ng-container>
            <ng-container matColumnDef="viavel">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Viabilidade </th>
                <td mat-cell *matCellDef="let reproducao" class="text-left"> {{reproducao.viavel ? 'Sim' : 'Não'}} </td>
            </ng-container>
            <ng-container matColumnDef="acoes">
                <th mat-card-header *matHeaderCellDef class="justify-between"> Ações </th>
                <td mat-cell *matCellDef="let reproducao" class="justify-end !pl-20">
                    <button mat-icon-button color="primary" title="Editar reprodução" (click)="reproducaoUpdateForm(reproducao.id)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" title="Excluir reprodução" (click)="openDialog(reproducao)">
                        <mat-icon>delete</mat-icon>
                    </button>
                    <button mat-icon-button color="accent" title="Visualizar orquidário" (click)="viewReproducaoOrquidario(reproducao.orquidarioId)">
                        <mat-icon>store_front</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="colunasExibidas" class="!p-3 !bg-purple-900 !text-white !justify-between"></tr>
            <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
        </table>
        <mat-paginator [length]="reproducoes().length"
                   [pageSize]="itensPorPagina()"
                   [pageSizeOptions]="[5, 10, 25, 50]"
                   (page)="onPageChange($event)"
                   >
        </mat-paginator>
    </mat-card-content>
</mat-card>
