<h2 mat-dialog-title class="flex items-center gap-2">
  <mat-icon [class.text-green-600]="data.type === 'success'" [class.text-red-600]="data.type === 'error'">
    {{ data.type === 'success' ? 'check_circle' : 'error' }}
  </mat-icon>
  {{ data.type === 'success' ? 'Sucesso' : 'Erro' }}
</h2>
<mat-dialog-content>
  <p class="mt-2">{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button
    [class]="data.type === 'success' ? '!bg-green-700 !text-white' : '!bg-red-700 !text-white'"
    (click)="close()">
    OK
  </button>
</mat-dialog-actions>
