<mat-card class="mx-20 mt-10 bg-purple-400 rounded-t-lg overflow-hidden">
    <mat-card-header class="bg-green-900">
        <h2 class="text-2xl font-bold text-white p-4">Orquidário</h2>
        <button matButton="filled" class="!text-white !bg-green-600 !hover:bg-green-700 mt-3" (click)="orquidarioCreateForm()">
            <mat-icon>add</mat-icon>
            Adicionar
        </button>
    </mat-card-header>
    <mat-card-content class="listagem p-4" appearance="outlined">
        <table mat-table [dataSource]="orquidarios()" class="mt-5 rounded-lg overflow-hidden">
            <ng-container matColumnDef="nome">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Nome </th>
                <td mat-cell *matCellDef="let orquidario" class="text-left"> {{orquidario.nome}} </td>
            </ng-container>
            <ng-container matColumnDef="endereco">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Endereço </th>
                <td mat-cell *matCellDef="let orquidario" class="text-left"> {{orquidario.endereco}} </td>
            </ng-container>
            <ng-container matColumnDef="dataCriacao">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Data de Criação </th>
                <td mat-cell *matCellDef="let orquidario" class="text-left"> {{orquidario.dataCriacao}} </td>
            </ng-container>

            <ng-container matColumnDef="areaMQuadrados">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Área em M² </th>
                <td mat-cell *matCellDef="let orquidario" class="text-left"> {{orquidario.areaMQuadrados}} </td>
            </ng-container>
            
            <ng-container matColumnDef="irrigadoAuto">
                <th mat-card-header *matHeaderCellDef class="text-left p-3"> Irrigação Automática </th>
                <td mat-cell *matCellDef="let orquidario" class="text-left"> {{orquidario.irrigadoAuto}} </td>
            </ng-container>
            

            <tr mat-header-row *matHeaderRowDef="colunasExibidas" class="!p-3 !bg-purple-900 !text-white"></tr>
            <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
        </table>
    </mat-card-content>
</mat-card>
