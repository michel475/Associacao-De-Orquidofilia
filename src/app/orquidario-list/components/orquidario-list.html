<mat-card class="mx-20 mt-10 bg-purple-400 rounded-lg">
    <mat-card-header class="bg-green-900 rounded-t-lg">
        <h2 class="text-2xl font-bold text-white p-4">Orquidário</h2>
    </mat-card-header>
    <mat-card-content class="listagem p-4" appearance="outlined">
        <table mat-table [dataSource]="orquidarios()" class="mt-5">
            <ng-container matColumnDef="nome">
                <th mat-card-header *matHeaderCellDef> Nome </th>
                <td mat-cell *matCellDef="let orquidario" class=""> {{orquidario.nome}} </td>
            </ng-container>
            <ng-container matColumnDef="endereco">
                <th mat-card-header *matHeaderCellDef> Endereço </th>
                <td mat-cell *matCellDef="let orquidario" class=""> {{orquidario.endereco}} </td>
            </ng-container>
            <ng-container matColumnDef="dataCriacao">
                <th mat-card-header *matHeaderCellDef> Data de Criação </th>
                <td mat-cell *matCellDef="let orquidario" class=""> {{orquidario.dataCriacao}} </td>
            </ng-container>
            <ng-container matColumnDef="irrigadoAuto">
                <th mat-card-header *matHeaderCellDef> Irrigação Automática </th>
                <td mat-cell *matCellDef="let orquidario" class=""> {{orquidario.irrigadoAuto}} </td>
            </ng-container>
            <ng-container matColumnDef="areaMQuadrados">
                <th mat-card-header *matHeaderCellDef> Área em Metros Quadrados </th>
                <td mat-cell *matCellDef="let orquidario" class=""> {{orquidario.areaMQuadrados}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="colunasExibidas" class="!p-3 !bg-purple-900 !text-white !rounded-t-lg"></tr>
            <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>

        </table>
    </mat-card-content>
</mat-card>
