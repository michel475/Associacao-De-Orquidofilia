<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-1 w-full animate-fade-in">
  <!-- Back Link -->
  <div class="mb-6">
    <a routerLink="/reproducaoFlor" class="text-sm font-medium text-primary hover:text-primary/80 flex items-center gap-1 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
      Voltar para listagem
    </a>
  </div>

<div class="mx-20 mt-10 bg-purple-400 rounded-lg">
    <h1 class="text-3xl px-2 py-3 font-extrabold tracking-tight text-foreground animate-fade-in">
        {{ isEditMode() ? 'Editar Reprodução' : 'Criar Reprodução' }}
    </h1>
    <mat-card class="listagem p-4 bg-purple-300" appearance="outlined">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="mb-4">
                <label for="orquidarioId" class="block text-sm font-medium text-muted-foreground">Orquidário ID</label>
                <input formControlName="orquidarioId" [value]="form.get('orquidarioId')" id="orquidarioId" type="text" name="orquidarioId" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="hibridoNome" class="block text-sm font-medium text-muted-foreground">Híbrido Nome</label>
                <input formControlName="hibridoNome" [value]="form.get('hibridoNome')" id="hibridoNome" type="text" name="hibridoNome" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="dataGerminacao" class="block text-sm font-medium text-muted-foreground">Data de Germinação</label>
                <input formControlName="dataGerminacao" [value]="form.get('dataGerminacao')" id="dataGerminacao" type="date" name="dataGerminacao" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="taxaSucessoPct" class="block text-sm font-medium text-muted-foreground">Taxa Sucesso (%)</label>
                <input formControlName="taxaSucessoPct" [value]="form.get('taxaSucessoPct')" id="taxaSucessoPct" type="number" name="taxaSucessoPct" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="viavel" class="block text-sm font-medium text-muted-foreground">Viabilidade</label>
                <input formControlName="viavel" id="true" type="radio" value="true" name="viavel" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="true">True</label>
                <input formControlName="viavel" id="false" type="radio" value="false" name="viavel" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="false">False</label>
            </div>
              <button type="submit" class="px-6 py-3 font-semibold text-center text-black bg-purple-400 rounded-lg shadow-md hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-opacity-75 transition duration-300">Enviar</button>
        </form>
    </mat-card>
</div>
