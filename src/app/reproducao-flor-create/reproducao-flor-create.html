<mat-card class="listagem min-w-full divide-y divide-border" appearance="outlined">
  <div class="overflow-x-auto max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-1 w-full animate-fade-in">
        <!-- Back Link -->
        <div class="mb-6 min-w-full divide-y divide-border">
          <button class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="button" (click)="home()">Voltar para listagem</button>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider">Orquidario Id</div>
            <input class="insercao px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="number" placeholder="" formControlName="orquidarioId">
            <br>
            <div class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider">Hibrido Nome</div>
            <input class="insercao px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="text" placeholder="" formControlName="hibridoNome">
            <br>
            <div class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider">Data de Germinacao</div>
            <input class="insercao px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="date" placeholder="" formControlName="dataGerminacao">
            <br>
            <div class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider">Taxa Sucesso (%)</div>
            <input class="insercao px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="number" placeholder="" formControlName="taxaSucessoPct">
            <br>
            <div class="px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider">Viabilidade</div>
            <input class="insercao px-6 py-4 text-left text-xs font-bold text-muted-foreground tracking-wider" type="boolean" placeholder="" formControlName="viavel">
          </div>
          <div class="flex items-center justify-end gap-3 pt-4 border-t border-border">
            <button type="submit">Enviar</button>
          </div>
          </form>
          </div>
          </div>
          </mat-card>
