<img src="/orquidea.png" alt="Imagem de uma orquídea" class="w-full h-40 object-cover">

<div class="mx-20 mt-10 bg-purple-400 rounded-lg">
    <h1 class="text-3xl px-2 py-3 font-extrabold tracking-tight text-foreground animate-fade-in">
        {{ orquidario ? 'Editar Orquidário' : 'Criar Orquidário' }}
    </h1>
    <mat-card class="listagem p-4 bg-purple-300" appearance="outlined">
        <form (ngSubmit)="enviarFormulario()">
            <div class="mb-4">
                <label for="endereco" class="block text-sm font-medium text-muted-foreground">Endereço</label>
                <input id="endereco" type="text" [(ngModel)]="orquidario.endereco" name="endereco" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="dataCriacao" class="block text-sm font-medium text-muted-foreground">Data de Criação</label>
                <input id="dataCriacao" type="date" [(ngModel)]="orquidario.dataCriacao" name="dataCriacao" required class="mt-1 block rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
            </div>
            <div class="mb-4">
                <label for="irrigadoAuto" class="block text-sm font-medium text-muted-foreground">Irrigação Automática</label>
                <input id="irrigadoAuto" type="checkbox" [(ngModel)]="orquidario.irrigadoAuto" name="irrigadoAuto" class="mt-1">
            </div>
            <div class="mb-4">
                <label for="areaMQuadrados" class="block text-sm font-medium text-muted-foreground">Área em Metros Quadrados</label>
                <input id="areaMQuadrados" type="number" [(ngModel)]="orquidario.areaMQuadrados" name="areaMQuadrados" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
            </div>
                
        </form>
    </mat-card>
</div>
