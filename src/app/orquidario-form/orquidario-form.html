<img src="/orquidea.png" alt="Imagem de uma orquídea" class="w-full h-40 object-cover">

<mat-card class="mx-20 mt-10 bg-purple-400 rounded-lg">
    <mat-card-header class="bg-green-900 rounded-t-lg">
        <mat-card-title class="!text-3xl px-2 py-3 !font-extrabold tracking-tight text-gray-100 text-foreground animate-fade-in">
            {{ orquidario ? 'Editar Orquidário' : 'Criar Orquidário' }}
        </mat-card-title>
    </mat-card-header>
    <mat-card-content class="listagem p-4 !bg-purple-100" appearance="outlined">
        <form (ngSubmit)="enviarFormulario()">
            <div class="my-4">
                <label for="endereco" class="block text-lg font-medium text-muted-foreground">Endereço</label>
                <input id="endereco" type="text" [(ngModel)]="orquidario.endereco" name="endereco" required class="my-1 p-1 h-8 w-full rounded-md bg-neutral-100 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                <label for="dataCriacao" class="block text-lg font-medium text-muted-foreground">Data de Criação</label>
                <input id="dataCriacao" type="date" [(ngModel)]="orquidario.dataCriacao" name="dataCriacao" required class="my-1 p-1 h-8 w-full bg-neutral-100 rounded-md !border-gray-600 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
            </div>
            <div class="my-4">
                <label for="irrigadoAuto" class="block text-lg font-medium text-muted-foreground">Irrigação Automática</label>
                <input id="irrigadoAuto" type="checkbox" [(ngModel)]="orquidario.irrigadoAuto" name="irrigadoAuto" class="my-1 h-8">
            </div>
            <div class="my-4">
                <label for="areaMQuadrados" class="block text-lg font-medium text-muted-foreground">Área em Metros Quadrados</label>
                <input id="areaMQuadrados" type="number" [(ngModel)]="orquidario.areaMQuadrados" name="areaMQuadrados" required class="my-1 p-1 h-8 w-full bg-neutral-100 rounded-md !border-gray-600 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button type="submit" class="px-4 py-2 bg-purple-500 text-purple-100 rounded-md hover:bg-purple-600 focus:outline-none focus:ring focus:bg-purple-800 focus:ring-purple-800/100">Salvar</button>
                <button type="button" class="px-4 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 focus:outline-none focus:ring focus:ring-gray-500/50">Cancelar</button>
            </div>
        </form>
    </mat-card-content>
</mat-card>
