<mat-card class="mx-20 mt-10 rounded-lg overflow-hidden">
    <mat-card-header class="bg-green-900">
        <mat-card-title class="!text-3xl px-2 py-3 !font-extrabold text-gray-100">
            {{ isEditMode() ? 'Editar Orquidário' : 'Criar Orquidário' }}
        </mat-card-title>
    </mat-card-header>

    <mat-card-content class="!p-0">
        <div class="flex">
            <div class="w-4/9 shrink-0">
                <img src="/orquidea-form.png" alt="Orquídea" class="w-200 h-full object-cover">
            </div>
                
                <div class="flex-1 p-6 bg-purple-100">
                <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col h-full">
                    <div>
                        <div class="mb-4">
                            <label for="nome" class="block text-lg font-medium"> Nome</label>
                            <input formControlName="nome" id="nome" type="text" [value]="form.get('nome')" name="nomeOrquidario" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>

                        <div class="mb-4">
                            <label for="endereco" class="block text-lg font-medium"> Endereço</label>
                            <input formControlName="endereco" id="endereco" type="text" [value]="form.get('endereco')" name="endereco" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>

                        <div class="mb-4">
                            <label for="dataCriacao" class="block text-lg font-medium text-muted-foreground">Data de Criação</label>
                            <input formControlName="dataCriacao" id="dataCriacao" type="date" [value]="form.get('dataCriacao')?.value"/*[value]="form.get('dataCriacao')" name="dataCriacao"*/ required class="mt-1 p-2 h-10 w-full bg-neutral-100 rounded-md !border-gray-600 shadow-sm focus:border-primary focus:ring focus:ring-primary/50">
                        </div>

                        <div class="mb-4">
                            <label for="areaMQuadrados" class="block text-lg font-medium">Área em M²</label>
                            <input formControlName="areaMQuadrados" id="areaMQuadrados" type="number" [value]="form.get('areaMQuadrados')" name="areaMQuadrados" required class="mt-1 p-2 w-full h-10 bg-neutral-100 rounded-md">
                        </div>
                        
                        <div class="flex items-center gap-2 mt-8">
                            <label for="irrigadoAuto" class="text-lg font-medium">Irrigação Automática</label>
                            <input formControlName="irrigadoAuto" id="irrigadoAuto" type="checkbox" [value]="form.get('irrigadoAuto')" name="irrigadoAuto" class="size-5 accent-green-800">
                        </div>

                    </div>
                    <div class="flex justify-end gap-4 mt-8">
                        <button type="submit" class="px-4 py-2 bg-green-800 text-white rounded-md">Salvar</button>
                        <button type="button" (click)="onCancel()" class="px-4 py-2 bg-gray-300 rounded-md">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>
    </mat-card-content>
</mat-card>
