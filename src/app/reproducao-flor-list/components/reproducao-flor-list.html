<mat-card class="mx-20 mt-10 bg-purple-400 rounded-lg">
    <mat-card-header class="bg-purple-900 rounded-t-lg">
        <h2 class="text-2xl font-bold text-white">Reproduções</h2>
    </mat-card-header>
    <mat-card-content class="listagem p-4" appearance="outlined">
      <div class="overflow-x-auto">
        <table mat-table [dataSource]="reproducoes()" class="mt-0 w-full table-auto text-lef">
            <ng-container matColumnDef="orquidarioId">
                <th mat-card-header *matHeaderCellDef> Orquidário Id </th>
                <td mat-cell *matCellDef="let reproducao"> {{reproducao.orquidarioId}} </td>
            </ng-container>
            <ng-container matColumnDef="hibridoNome">
                <th mat-card-header *matHeaderCellDef> Hibrido Nome </th>
                <td mat-cell *matCellDef="let reproducao"> {{reproducao.hibridoNome}} </td>
            </ng-container>
            <ng-container matColumnDef="dataGerminacao">
                <th mat-card-header *matHeaderCellDef> Data de Germinação </th>
                <td mat-cell *matCellDef="let reproducao"> {{reproducao.dataGerminacao}} </td>
            </ng-container>
            <ng-container matColumnDef="taxaSucessoPct">
                <th mat-card-header *matHeaderCellDef> Taxa de Sucesso (%) </th>
                <td mat-cell *matCellDef="let reproducao"> {{reproducao.taxaSucessoPct}} </td>
            </ng-container>
            <ng-container matColumnDef="viavel">
                <th mat-card-header *matHeaderCellDef> Viabilidade </th>
                <td mat-cell *matCellDef="let reproducao"> {{reproducao.viavel}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="colunasExibidas" class="!p-3 !bg-purple-900 !text-white !rounded-t-lg"></tr>
            <tr mat-row *matRowDef="let row; columns: colunasExibidas;"></tr>
        </table>
        </div>
    </mat-card-content>
</mat-card>
